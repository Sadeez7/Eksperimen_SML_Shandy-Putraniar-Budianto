name: Data Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'churn_raw/**'
      - 'preprocessing/automate_*.py'

jobs:
  build-and-preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7' # Sesuai rekomendasi Dicoding

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run preprocessing script
        # Ganti "NamaKamu" di bawah ini sesuai nama file aslinya
        run: |
          python preprocessing/automate_NamaKamu.py 

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add churn_preprocessing/
          # Commit hanya jika ada perubahan
          git commit -m "Auto-preprocess data via GitHub Actions" -a || echo "No changes to commit"
          git push